name: Longterm Update

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "data/**"
      - "dashboard/api/**"
      - "public/**"
  schedule:
    - cron: "0 */4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    env:
      CI: true
      VALIDATION_MODE: production
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_PROGRESS: "false"
      NPM_CONFIG_LEGACY_PEER_DEPS: "true"
      UPDATE_MODE: scheduled
      UPDATE_TIMEOUT_MS: 900000
      SOURCE_TIMEOUT_MS: 30000
      MAX_PORTS_PER_RUN: 50
      MAX_OUTPUT_ROWS: 10000
      MAX_SOURCE_ROWS: 5000
      MAX_TARGET_VESSELS: 5000
      MAX_CANDIDATES: 1000
      MAX_CHILD_ENRICHMENT_ROWS: 100
      MAX_IMO_RECOVERY_CALLS: 100
      MAX_API_RESPONSE_BYTES: 25000000
      PORT_OPERATION_NUM_OF_ROWS: 50
      PORT_OPERATION_MAX_PAGES: 20
      PORT_OPERATION_DEGB_VALUES: "I,O"
      COLLECTOR_RUNTIME_BUDGET_MS: 720000
      ENABLE_SOURCE_CSV: "true"
      COLLECTOR_DEBUG_VERBOSE: "false"
      DB_STORAGE_MODE: lean
      DB_ANALYTICS_SCOPE: candidate
      DB_FOUNDATION_WRITE_MODE: minimal
      DB_RETENTION_CLEANUP: "true"
      DB_RETENTION_PROFILE: ${{ vars.DB_RETENTION_PROFILE || 'free_500mb' }}
      DB_RETENTION_TARGET_MB: ${{ vars.DB_RETENTION_TARGET_MB || '' }}
      DB_RETENTION_HARD_CAP_MB: ${{ vars.DB_RETENTION_HARD_CAP_MB || '' }}
      DB_RETENTION_KEEP_PROMOTED_RUNS: ${{ vars.DB_RETENTION_KEEP_PROMOTED_RUNS || '' }}
      DB_RETENTION_VESSEL_SNAPSHOTS_DAYS: ${{ vars.DB_RETENTION_VESSEL_SNAPSHOTS_DAYS || '' }}
      DB_RETENTION_PORT_CALL_MASTER_DAYS: ${{ vars.DB_RETENTION_PORT_CALL_MASTER_DAYS || '' }}
      DB_RETENTION_RISK_HISTORY_DAYS: ${{ vars.DB_RETENTION_RISK_HISTORY_DAYS || '' }}
      DB_RETENTION_ENRICHMENT_DAYS: ${{ vars.DB_RETENTION_ENRICHMENT_DAYS || '' }}
      DB_RETENTION_SOURCE_LOGS_DAYS: ${{ vars.DB_RETENTION_SOURCE_LOGS_DAYS || '' }}
      DB_RETENTION_DASHBOARD_SUMMARY_DAYS: ${{ vars.DB_RETENTION_DASHBOARD_SUMMARY_DAYS || '' }}
      DB_RETENTION_CURRENT_STALE_DAYS: ${{ vars.DB_RETENTION_CURRENT_STALE_DAYS || '' }}
      DB_RETENTION_EVENT_DAYS: ${{ vars.DB_RETENTION_EVENT_DAYS || '' }}
      DB_RETENTION_PILOT_EVENT_DAYS: ${{ vars.DB_RETENTION_PILOT_EVENT_DAYS || '' }}
      DB_RETENTION_CONGESTION_DAYS: ${{ vars.DB_RETENTION_CONGESTION_DAYS || '' }}
      DB_RETENTION_IDENTITY_DAYS: ${{ vars.DB_RETENTION_IDENTITY_DAYS || '' }}
      DB_RETENTION_HISTORY_DAYS: ${{ vars.DB_RETENTION_HISTORY_DAYS || '' }}
      DB_RETENTION_ROUTE_PREDICTION_DAYS: ${{ vars.DB_RETENTION_ROUTE_PREDICTION_DAYS || '' }}
      DB_RETENTION_DAILY_WAREHOUSE_DAYS: ${{ vars.DB_RETENTION_DAILY_WAREHOUSE_DAYS || '' }}
      DB_RETENTION_RAW_ARCHIVE_INDEX_DAYS: ${{ vars.DB_RETENTION_RAW_ARCHIVE_INDEX_DAYS || '' }}
      DB_RETENTION_RULE_DAYS: ${{ vars.DB_RETENTION_RULE_DAYS || '' }}
      DB_RETENTION_FEATURE_DAYS: ${{ vars.DB_RETENTION_FEATURE_DAYS || '' }}
      DB_RETENTION_MODEL_DAYS: ${{ vars.DB_RETENTION_MODEL_DAYS || '' }}
      DB_RETENTION_EXPLAINABILITY_DAYS: ${{ vars.DB_RETENTION_EXPLAINABILITY_DAYS || '' }}
      EVENT_PREVIOUS_SNAPSHOT_LIMIT: 1500
      SUPABASE_BATCH_SIZE: 200
      ARCHIVE_TO_DRIVE: "true"
      SOURCE_CSV_URL: ${{ secrets.SOURCE_CSV_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VESSEL_SPEC_SERVICE_KEY: ${{ secrets.VESSEL_SPEC_SERVICE_KEY }}
      VESSEL_SPEC_API_URL: ${{ secrets.VESSEL_SPEC_API_URL }}
      PILOT_SOURCE_URLS: ${{ secrets.PILOT_SOURCE_URLS }}
      BERTH_SOURCE_URLS: ${{ secrets.BERTH_SOURCE_URLS }}
      PORT_FACILITY_SERVICE_KEY: ${{ secrets.PORT_FACILITY_SERVICE_KEY }}
      PORT_FACILITY_API_URL: ${{ secrets.PORT_FACILITY_API_URL }}
      PORT_OPERATION_SERVICE_KEY: ${{ secrets.PORT_OPERATION_SERVICE_KEY || secrets.PORT_OPERATION_API_KEY || secrets.DATA_GO_KR_API_KEY || secrets.SERVICE_KEY || secrets.SERVICEKEY || secrets.YGPA_SERVICE_KEY }}
      PORT_OPERATION_API_KEY: ${{ secrets.PORT_OPERATION_API_KEY }}
      DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
      SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
      SERVICEKEY: ${{ secrets.SERVICEKEY }}
      YGPA_SERVICE_KEY: ${{ secrets.YGPA_SERVICE_KEY }}
      PORT_OPERATION_API_URL: ${{ vars.PORT_OPERATION_API_URL || secrets.PORT_OPERATION_API_URL || 'http://apis.data.go.kr/1192000/VsslEtrynd5/Info5' }}
      ULSAN_API_URL: ${{ secrets.ULSAN_API_URL }}
      ULSAN_API_KEY: ${{ secrets.ULSAN_API_KEY }}
      ULSAN_BERTH_DETAIL_API_URL: ${{ secrets.ULSAN_BERTH_DETAIL_API_URL }}
      ULSAN_CARGO_PLAN_API_URL: ${{ secrets.ULSAN_CARGO_PLAN_API_URL }}
      ULSAN_BERTH_OPERATION_API_URL: ${{ secrets.ULSAN_BERTH_OPERATION_API_URL }}
      ULSAN_TERMINAL_PROCESS_API_URL: ${{ secrets.ULSAN_TERMINAL_PROCESS_API_URL }}
      ULSAN_BERTH_DETAIL_API_KEY: ${{ secrets.ULSAN_BERTH_DETAIL_API_KEY }}
      ULSAN_CARGO_PLAN_API_KEY: ${{ secrets.ULSAN_CARGO_PLAN_API_KEY }}
      ULSAN_BERTH_OPERATION_API_KEY: ${{ secrets.ULSAN_BERTH_OPERATION_API_KEY }}
      ULSAN_TERMINAL_PROCESS_API_KEY: ${{ secrets.ULSAN_TERMINAL_PROCESS_API_KEY }}
      MOF_VTS_API_BASE: ${{ secrets.MOF_VTS_API_BASE }}
      MOF_VTS_SERVICE_KEY: ${{ secrets.MOF_VTS_SERVICE_KEY }}
      MOF_VTS_PORT_CODES: ${{ secrets.MOF_VTS_PORT_CODES }}
      MOF_AIS_DYNAMIC_API_URL: ${{ secrets.MOF_AIS_DYNAMIC_API_URL }}
      MOF_AIS_DYNAMIC_SERVICE_KEY: ${{ secrets.MOF_AIS_DYNAMIC_SERVICE_KEY }}
      MOF_AIS_DYNAMIC_PER_PAGE: ${{ secrets.MOF_AIS_DYNAMIC_PER_PAGE }}
      MOF_AIS_INFO_API_URL: ${{ secrets.MOF_AIS_INFO_API_URL }}
      MOF_AIS_INFO_SERVICE_KEY: ${{ secrets.MOF_AIS_INFO_SERVICE_KEY }}
      MOF_AIS_INFO_PER_PAGE: ${{ secrets.MOF_AIS_INFO_PER_PAGE }}
      MOF_AIS_STAT_API_URL: ${{ secrets.MOF_AIS_STAT_API_URL }}
      MOF_AIS_STAT_SERVICE_KEY: ${{ secrets.MOF_AIS_STAT_SERVICE_KEY }}
      MOF_AIS_STAT_PER_PAGE: ${{ secrets.MOF_AIS_STAT_PER_PAGE }}
      NOAA_SST_URL: ${{ vars.NOAA_SST_URL || secrets.NOAA_SST_URL || '' }}
      GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      PNC_SOURCE_URLS: ${{ secrets.PNC_SOURCE_URLS }}

    steps:
      - name: Workflow start diagnostics
        run: |
          echo "workflow=${{ github.workflow }}"
          echo "run_id=${{ github.run_id }}"
          echo "ref=${{ github.ref }}"
          echo "runner_os=${{ runner.os }}"
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          node - <<'NODE'
          console.log({
            PORT_OPERATION_API_URL: !!process.env.PORT_OPERATION_API_URL,
            PORT_OPERATION_SERVICE_KEY: !!process.env.PORT_OPERATION_SERVICE_KEY,
            PORT_OPERATION_API_KEY: !!process.env.PORT_OPERATION_API_KEY,
            DATA_GO_KR_API_KEY: !!process.env.DATA_GO_KR_API_KEY,
            SERVICE_KEY: !!process.env.SERVICE_KEY,
            SERVICEKEY: !!process.env.SERVICEKEY,
            YGPA_SERVICE_KEY: !!process.env.YGPA_SERVICE_KEY,
            PORT_FACILITY_API_URL: !!process.env.PORT_FACILITY_API_URL,
            PORT_FACILITY_SERVICE_KEY: !!process.env.PORT_FACILITY_SERVICE_KEY,
            PORT_FACILITY_API_KEY: !!process.env.PORT_FACILITY_API_KEY,
            SUPABASE_URL: !!process.env.SUPABASE_URL,
            SUPABASE_SERVICE_ROLE_KEY: !!process.env.SUPABASE_SERVICE_ROLE_KEY,
            SOURCE_CSV_URL: !!process.env.SOURCE_CSV_URL,
            ENABLE_SOURCE_CSV: process.env.ENABLE_SOURCE_CSV,
            VESSEL_SPEC_SERVICE_KEY: !!process.env.VESSEL_SPEC_SERVICE_KEY,
            VESSEL_SPEC_API_URL: !!process.env.VESSEL_SPEC_API_URL,
            PILOT_SOURCE_URLS: !!process.env.PILOT_SOURCE_URLS,
            BERTH_SOURCE_URLS: !!process.env.BERTH_SOURCE_URLS,
            PNC_SOURCE_URLS: !!process.env.PNC_SOURCE_URLS,
            MOF_AIS_DYNAMIC_SERVICE_KEY: !!process.env.MOF_AIS_DYNAMIC_SERVICE_KEY,
            MOF_AIS_DYNAMIC_API_URL: !!process.env.MOF_AIS_DYNAMIC_API_URL,
            MOF_AIS_INFO_SERVICE_KEY: !!process.env.MOF_AIS_INFO_SERVICE_KEY,
            MOF_AIS_INFO_API_URL: !!process.env.MOF_AIS_INFO_API_URL,
            MOF_AIS_STAT_SERVICE_KEY: !!process.env.MOF_AIS_STAT_SERVICE_KEY,
            MOF_AIS_STAT_API_URL: !!process.env.MOF_AIS_STAT_API_URL,
            ULSAN_API_KEY: !!process.env.ULSAN_API_KEY,
            ULSAN_API_URL: !!process.env.ULSAN_API_URL,
            ULSAN_BERTH_DETAIL_API_KEY: !!process.env.ULSAN_BERTH_DETAIL_API_KEY,
            ULSAN_BERTH_DETAIL_API_URL: !!process.env.ULSAN_BERTH_DETAIL_API_URL,
            ULSAN_CARGO_PLAN_API_KEY: !!process.env.ULSAN_CARGO_PLAN_API_KEY,
            ULSAN_CARGO_PLAN_API_URL: !!process.env.ULSAN_CARGO_PLAN_API_URL,
            ULSAN_BERTH_OPERATION_API_KEY: !!process.env.ULSAN_BERTH_OPERATION_API_KEY,
            ULSAN_BERTH_OPERATION_API_URL: !!process.env.ULSAN_BERTH_OPERATION_API_URL,
            ULSAN_TERMINAL_PROCESS_API_KEY: !!process.env.ULSAN_TERMINAL_PROCESS_API_KEY,
            ULSAN_TERMINAL_PROCESS_API_URL: !!process.env.ULSAN_TERMINAL_PROCESS_API_URL,
            VALIDATION_MODE: process.env.VALIDATION_MODE,
            UPDATE_MODE: process.env.UPDATE_MODE,
            CI: process.env.CI,
            GITHUB_ACTIONS: process.env.GITHUB_ACTIONS,
            GITHUB_RUN_ID: process.env.GITHUB_RUN_ID,
            GITHUB_WORKFLOW: process.env.GITHUB_WORKFLOW
          });
          NODE

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Compute SST cache key
        id: sst-cache-key
        run: echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Restore daily NOAA SST cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: noaa-sst-${{ runner.os }}-${{ steps.sst-cache-key.outputs.date }}
          restore-keys: |
            noaa-sst-${{ runner.os }}-

      - name: Reset npm registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set audit false
          npm config set fund false
          npm config set progress false
          npm config get registry

      - name: Install dependencies (npm safe path)
        timeout-minutes: 4
        run: |
          npm ci --legacy-peer-deps --no-audit --no-fund --progress=false --registry=https://registry.npmjs.org/ || npm install --legacy-peer-deps --no-audit --no-fund --progress=false --registry=https://registry.npmjs.org/

      - name: Collect public port data and build dashboard
        timeout-minutes: 20
        run: |
          echo "Starting HWK public-data collection pipeline"
          echo "Collectors are executed inside scripts/update.js -> collectKoreaData()"
          npm run update

      - name: Generate Biofouling Next 4 Days GeoJSON
        if: always()
        continue-on-error: true
        run: npm run biofouling:generate || echo "Biofouling Next 4 Days snapshot skipped"

      - name: Print collector diagnostics
        if: always()
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const path = "dashboard/api/status.json";
          if (!fs.existsSync(path)) {
            console.log("status.json was not generated.");
            process.exit(0);
          }
          const status = JSON.parse(fs.readFileSync(path, "utf8"));
          const diag = status.collector_diagnostics || {};
          console.log("=== HWK Collector Diagnostics ===");
          console.log(`status=${status.status || "unknown"}`);
          if (status.error) console.log(`error=${status.error}`);
          console.log(`data_mode=${status.data_mode}`);
          console.log(`records=${status.record_count}`);
          console.log(`all_vessels=${status.all_collected_vessel_count || status.all_vessels_count || 0}`);
          console.log(`target_vessels=${status.target_vessel_count || status.target_vessels_count || 0}`);
          console.log(`attempted=${diag.attempted_count || 0}`);
          console.log(`success=${diag.success_count || 0}`);
          console.log(`failed=${diag.failed_count || 0}`);
          console.log(`skipped=${diag.skipped_count || 0}`);
          console.log(`real_rows=${diag.real_row_count || 0}`);
          console.log(`actionable_rows=${diag.actionable_row_count || status.actionable_rows || 0}`);
          console.log(`fallback_used=${Boolean(diag.fallback_used)}`);
          for (const source of diag.sources || []) {
            const state = source.success ? "success" : source.skipped ? `skipped:${source.reason || "unknown"}` : source.error ? `failed:${source.error}` : "pending";
            console.log(`${source.key}: ${state}; rows=${source.row_count || 0}; normalized=${source.normalized_count || 0}; actionable=${source.actionable_count || 0}; profile=${source.source_profile || "unknown"}`);
            if (source.warning) console.log(`  warning=${source.warning}`);
            if (source.http_status) console.log(`  http_status=${source.http_status}; resultCode=${source.resultCode || ""}; totalCount=${source.totalCount || ""}`);
            if (source.requested_url_without_service_key) console.log(`  request=${source.requested_url_without_service_key}`);
            if (source.sample_keys?.length) console.log(`  sample_keys=${source.sample_keys.join(",")}`);
            if (source.child_enrichment) console.log(`  child_enrichment=${JSON.stringify(source.child_enrichment)}`);
          }
          console.log("storage.supabase=", status.storage_status?.supabase?.status || status.supabase_write?.status || "unknown");
          console.log("storage.supabase.promoted=", status.storage_status?.supabase?.promoted ?? status.supabase_write?.promoted ?? "unknown");
          console.log("storage.supabase.error=", status.storage_status?.supabase?.error || status.supabase_write?.error || "");
          console.log("storage.supabase.promotion_blockers=", JSON.stringify(status.promotion_blockers || status.storage_status?.supabase?.promotion_blockers || status.storage_status?.supabase?.promotion?.promotion_blockers || status.supabase_write?.promotion_blockers || status.supabase_write?.promotion?.promotion_blockers || []));
          console.log("storage.supabase.failure_type=", status.supabase_write_failure_type || status.storage_status?.supabase?.failure_type || status.supabase_write?.failure_type || "");
          console.log("storage.supabase.rows_written_by_table=", JSON.stringify(status.rows_written_by_table || status.storage_status?.supabase?.db_rows_written_by_table || status.supabase_write?.db_rows_written_by_table || {}));
          console.log("storage.supabase.post_write_verification=", status.storage_status?.supabase?.post_write_verification?.status || status.supabase_write?.post_write_verification?.status || "unknown");
          console.log("storage.supabase.post_write_verification_errors=", JSON.stringify(status.post_write_verification_all_errors || status.post_write_verification_errors || status.supabase_write?.post_write_verification?.all_errors || status.supabase_write?.post_write_verification?.errors || []));
          console.log("storage.supabase.active_run_id=", status.active_run_id || status.supabase_write?.active_run_id || "");
          console.log("storage.supabase.latest_successful_run_id=", status.latest_successful_run_id || status.supabase_write?.latest_successful_run_id || "");
          console.log("storage.gdrive=", status.storage_status?.gdrive?.status || status.gdrive_archive?.status || "unknown");
          NODE

      - name: Audit data health
        if: always()
        timeout-minutes: 2
        run: npm run audit:data

      - name: Validate output
        if: always()
        timeout-minutes: 2
        run: npm run validate

      - name: Audit source diagnostics
        if: always()
        timeout-minutes: 2
        run: npm run audit:sources

      - name: Verify source diagnostics provenance
        if: always()
        run: |
          node - <<'NODE'
          const fs = require("fs");
          for (const file of ["dashboard/api/source-health-runtime.json", "dashboard/api/source-collection-status.json"]) {
            if (!fs.existsSync(file)) {
              console.log(`::warning::${file} missing; check update output and hwk-generated-snapshot artifact.`);
              continue;
            }
            const payload = JSON.parse(fs.readFileSync(file, "utf8"));
            const generatedBy = payload.generated_by || "unknown";
            const isGithubActions = payload.is_github_actions === true;
            const runId = payload.GITHUB_RUN_ID || null;
            const workflow = payload.GITHUB_WORKFLOW || null;
            console.log(`${file}: generated_by=${generatedBy}; is_github_actions=${isGithubActions}; GITHUB_RUN_ID=${runId || "null"}; GITHUB_WORKFLOW=${workflow || "null"}; run_id=${payload.run_id || "null"}`);
            if (generatedBy === "local" || !isGithubActions || !runId || !workflow) {
              console.log(`::warning::Repo source diagnostics may not reflect GitHub Actions secrets. Check hwk-generated-snapshot artifact.`);
            }
          }
          NODE

      - name: Commit generated dashboard snapshots
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            dashboard/api/source-health-runtime.json \
            dashboard/api/source-collection-status.json \
            dashboard/api/status-summary.json \
            dashboard/api/endpoint-manifest.json \
            dashboard/api/bootstrap.json
          if git diff --cached --quiet; then
            echo "No generated dashboard snapshot changes to commit"
          else
            git commit -m "chore: update generated dashboard snapshots [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Run health audit
        timeout-minutes: 2
        run: npm run health

      - name: Deploy Cloudflare Worker
        timeout-minutes: 5
        run: |
          echo "Preparing Cloudflare snapshot asset upload"
          if [ -d dashboard/api ]; then
            mv dashboard/api ./api.cloudflare-upload-full
            mkdir -p dashboard/api
            copy_api_asset() {
              src="./api.cloudflare-upload-full/$1"
              dest="dashboard/api/$1"
              if [ -f "$src" ]; then
                mkdir -p "$(dirname "$dest")"
                cp "$src" "$dest"
              fi
            }
            for file in \
              bootstrap.json \
              dashboard-summary.json \
              status.json \
              source-health-runtime.json \
              source-collection-status.json \
              data-continuity.json \
              health/pipeline.json \
              candidates/top.json \
              targets/current.json \
              targets/categories.json \
              arrival-pipeline.json \
              anchorage-waiting.json \
              staying-vessels.json \
              agent-followup-queue.json \
              sales/verification-queue.json \
              sales/actions.json \
              sales/conversion-pipeline.json \
              watchlist/current.json \
              alerts/sales-alerts.json \
              intelligence/sales-priority.json \
              intelligence/risk-summary.json \
              intelligence/biofouling-risk.json \
              intelligence/hull-cleaning-engine.json \
              intelligence/cleaning-window.json \
              intelligence/explainability.json \
              intelligence/commercial-summary.json \
              intelligence/route-summary.json \
              intelligence/operator-summary.json \
              intelligence/operator-opportunities.json \
              intelligence/agent-summary.json \
              intelligence/agent-relationship.json \
              intelligence/repeat-callers.json \
              intelligence/fleet-summary.json \
              intelligence/fleet-memory.json \
              intelligence/customer-memory.json \
              intelligence/fleet-penetration.json \
              intelligence/fleet-expansion.json \
              intelligence/fleet-clusters.json \
              intelligence/port-opportunities.json \
              intelligence/vessel-timeline.json \
              intelligence/korea-presence.json \
              intelligence/superintendent-targets.json \
              intelligence/compliance-opportunities.json \
              intelligence/drydock-prediction.json \
              intelligence/revenue-forecast.json \
              intelligence/prediction-summary.json \
              biofouling/port-risk-map.json \
              biofouling/vessel-risk-scores.json \
              biofouling/hotspots.json \
              biofouling/top-hull-cleaning-candidates.json \
              biofouling/brazil-compliance-risk.json \
              biofouling/port-risk-map.geojson \
              biofouling/hotspots.geojson \
              reports/morning-brief.json \
              reports/executive-weekly.json; do
              copy_api_asset "$file"
            done
            if [ -d ./api.cloudflare-upload-full/vessels ]; then
              mkdir -p dashboard/api/vessels
              cp ./api.cloudflare-upload-full/vessels/index.json dashboard/api/vessels/ 2>/dev/null || true
              cp ./api.cloudflare-upload-full/vessels/page-*.json dashboard/api/vessels/ 2>/dev/null || true
            fi
            if [ -d ./api.cloudflare-upload-full/ports ]; then
              while IFS= read -r src; do
                rel="${src#./api.cloudflare-upload-full/}"
                mkdir -p "dashboard/api/$(dirname "$rel")"
                cp "$src" "dashboard/api/$rel"
              done < <(find ./api.cloudflare-upload-full/ports -path '*/hull-cleaning.json' -type f)
            fi
            find dashboard/api -type f | sort
            trap 'rm -rf dashboard/api; mv ./api.cloudflare-upload-full dashboard/api' EXIT
          fi
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload generated snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hwk-generated-snapshot
          retention-days: 14
          path: |
            data/latest-lite.json
            data/pipeline-report.json
            data/reports/
            data/history/
            dashboard/api/
            public/
