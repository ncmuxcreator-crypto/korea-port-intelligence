name: DB Cleanup

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Actually delete eligible run-level rows after backup"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      max_runs:
        description: "Maximum safe run candidates to process"
        required: true
        default: "5"
      max_rows:
        description: "Maximum rows per table/run candidate"
        required: true
        default: "1000"

concurrency:
  group: db-cleanup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    env:
      CI: true
      VALIDATION_MODE: production
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund --progress=false

      - name: Refresh cleanup audit and plan
        run: |
          npm run audit:db-cleanup
          npm run plan:db-cleanup

      - name: Execute dry-run or apply cleanup
        run: |
          if [ "${{ inputs.apply }}" = "true" ]; then
            npm run db:cleanup:apply -- --max-runs=${{ inputs.max_runs }} --max-rows=${{ inputs.max_rows }}
          else
            npm run db:cleanup:dry-run -- --max-runs=${{ inputs.max_runs }} --max-rows=${{ inputs.max_rows }}
          fi

      - name: Validate generated reports
        run: npm run validate

      - name: Upload cleanup reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: korea-port-intelligence-db-cleanup-report
          retention-days: 30
          path: |
            dashboard/api/storage-efficiency-report.json
            dashboard/api/db-cleanup-plan.json
            dashboard/api/db-cleanup-execution-report.json
            docs/DB_CLEANUP_AUDIT.md
            docs/DB_CLEANUP_PLAN.md
            docs/DB_CLEANUP_EXECUTION_REPORT.md
            data/db-cleanup-backups/

      - name: Commit cleanup reports
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            dashboard/api/storage-efficiency-report.json \
            dashboard/api/db-cleanup-plan.json \
            dashboard/api/db-cleanup-execution-report.json \
            docs/DB_CLEANUP_AUDIT.md \
            docs/DB_CLEANUP_PLAN.md \
            docs/DB_CLEANUP_EXECUTION_REPORT.md
          if git diff --cached --quiet; then
            echo "No cleanup report changes to commit"
          else
            git commit -m "chore: update db cleanup reports [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
