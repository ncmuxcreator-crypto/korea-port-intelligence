name: Fast Auxiliary Update

on:
  workflow_dispatch:
  schedule:
    - cron: "45 */4 * * *"

concurrency:
  group: fast-aux-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-aux:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    env:
      CI: true
      VALIDATION_MODE: production
      UPDATE_MODE: fast_aux
      SOURCE_CSV_MODE: off
      ENRICHMENT_MODE: lightweight
      DISCOVERY_MODE: off
      DB_AUDIT_MODE: off
      RUN_HEAVY_AUDITS: "false"
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_PROGRESS: "false"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PORT_OPERATION_SERVICE_KEY: ${{ secrets.PORT_OPERATION_SERVICE_KEY || secrets.PORT_OPERATION_API_KEY || secrets.DATA_GO_KR_API_KEY || secrets.SERVICE_KEY || secrets.SERVICEKEY || secrets.YGPA_SERVICE_KEY }}
      PORT_OPERATION_API_URL: ${{ vars.PORT_OPERATION_API_URL || secrets.PORT_OPERATION_API_URL || 'http://apis.data.go.kr/1192000/VsslEtrynd5/Info5' }}
      PILOT_SOURCE_URLS: ${{ secrets.PILOT_SOURCE_URLS }}
      BERTH_SOURCE_URLS: ${{ secrets.BERTH_SOURCE_URLS }}
      PNC_SOURCE_URLS: ${{ secrets.PNC_SOURCE_URLS }}
      VESSEL_SPEC_SERVICE_KEY: ${{ secrets.VESSEL_SPEC_SERVICE_KEY }}
      VESSEL_SPEC_API_URL: ${{ secrets.VESSEL_SPEC_API_URL }}
      MOF_AIS_DYNAMIC_API_URL: ${{ secrets.MOF_AIS_DYNAMIC_API_URL }}
      MOF_AIS_DYNAMIC_SERVICE_KEY: ${{ secrets.MOF_AIS_DYNAMIC_SERVICE_KEY }}
      MOF_AIS_INFO_API_URL: ${{ secrets.MOF_AIS_INFO_API_URL }}
      MOF_AIS_INFO_SERVICE_KEY: ${{ secrets.MOF_AIS_INFO_SERVICE_KEY }}
      MOF_AIS_STAT_API_URL: ${{ secrets.MOF_AIS_STAT_API_URL }}
      MOF_AIS_STAT_SERVICE_KEY: ${{ secrets.MOF_AIS_STAT_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund --progress=false

      - name: Refresh fast auxiliary summaries
        timeout-minutes: 15
        run: npm run update:fast-aux

      - name: Audit fast auxiliary cache
        if: always()
        run: npm run audit:fast-aux

      - name: Validate
        if: always()
        run: npm run validate

      - name: Guard fast auxiliary refresh
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const cache = JSON.parse(fs.readFileSync("dashboard/api/aux/latest/cache-status.json", "utf8"));
          const ignored = new Set(["source_csv"]);
          const items = (cache.items || []).filter(item => item && !ignored.has(item.source_key));
          const configured = items.filter(item => item.configured === true);
          const refreshed = items.filter(item =>
            item.attempted === true &&
            ["ACTIVE", "PARTIAL", "SUCCESS"].includes(String(item.current_attempt_status || item.status || "").toUpperCase()) &&
            Number(item.rows_collected || item.rows_normalized || item.rows_matched_to_vessels || 0) > 0
          );
          const reused = items.filter(item => item.using_previous_cache === true);
          const optionalMissing = items.filter(item =>
            item.configured === false &&
            /missing_env|missing_api_url|not_configured/i.test(String(item.current_attempt_error || item.blocker_reason || item.current_attempt_status || ""))
          );
          console.log(`fast_aux refreshed_source_count=${refreshed.length}`);
          console.log(`fast_aux configured_source_count=${configured.length}`);
          console.log(`fast_aux reused_previous_cache_count=${reused.length}`);
          console.log(`fast_aux optional_missing=${optionalMissing.map(item => `${item.source_key}:${item.current_attempt_error || item.blocker_reason || item.current_attempt_status}`).join(",") || "none"}`);
          if (!configured.length) {
            console.warn("fast_aux has no configured auxiliary sources; generated optional warnings and cache metadata only.");
            process.exit(0);
          }
          if (!refreshed.length && reused.length) {
            console.warn("fast_aux produced no fresh rows, but previous auxiliary cache is available; treating as optional warning.");
            process.exit(0);
          }
          if (!refreshed.length) {
            throw new Error("fast_aux had configured auxiliary sources but produced no refreshed rows and no reusable cache.");
          }
          NODE

      - name: Audit tier consistency
        run: npm run audit:tiered-update

      - name: Upload auxiliary cache artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: korea-port-intelligence-fast-aux-cache
          retention-days: 14
          path: |
            dashboard/api/aux/latest/
            dashboard/api/aux/pilotage-summary.json
            dashboard/api/aux/berth-summary.json
            dashboard/api/aux/ais-info-summary.json
            dashboard/api/aux/ais-dynamic-summary.json
            dashboard/api/aux/ais-stat-summary.json
            dashboard/api/aux/vessel-spec-summary.json
            dashboard/api/aux/cache-status.json
            dashboard/api/runtime/update-tiers.json

      - name: Print runtime context
        if: always()
        run: node scripts/print-runtime-context.js
