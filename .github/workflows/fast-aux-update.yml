name: Fast Auxiliary Update

on:
  workflow_dispatch:
  schedule:
    - cron: "45 */4 * * *"

concurrency:
  group: fast-aux-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-aux:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    env:
      CI: true
      VALIDATION_MODE: production
      UPDATE_MODE: fast_aux
      SOURCE_CSV_MODE: off
      ENRICHMENT_MODE: lightweight
      DISCOVERY_MODE: off
      DB_AUDIT_MODE: off
      RUN_HEAVY_AUDITS: "false"
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_PROGRESS: "false"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PORT_OPERATION_SERVICE_KEY: ${{ secrets.PORT_OPERATION_SERVICE_KEY || secrets.PORT_OPERATION_API_KEY || secrets.DATA_GO_KR_API_KEY || secrets.SERVICE_KEY || secrets.SERVICEKEY || secrets.YGPA_SERVICE_KEY }}
      PORT_OPERATION_API_URL: ${{ vars.PORT_OPERATION_API_URL || secrets.PORT_OPERATION_API_URL || 'http://apis.data.go.kr/1192000/VsslEtrynd5/Info5' }}
      PILOT_SOURCE_URLS: ${{ secrets.PILOT_SOURCE_URLS }}
      BERTH_SOURCE_URLS: ${{ secrets.BERTH_SOURCE_URLS }}
      PNC_SOURCE_URLS: ${{ secrets.PNC_SOURCE_URLS }}
      VESSEL_SPEC_SERVICE_KEY: ${{ secrets.VESSEL_SPEC_SERVICE_KEY }}
      VESSEL_SPEC_API_URL: ${{ secrets.VESSEL_SPEC_API_URL }}
      MOF_AIS_DYNAMIC_API_URL: ${{ secrets.MOF_AIS_DYNAMIC_API_URL }}
      MOF_AIS_DYNAMIC_SERVICE_KEY: ${{ secrets.MOF_AIS_DYNAMIC_SERVICE_KEY }}
      MOF_AIS_INFO_API_URL: ${{ secrets.MOF_AIS_INFO_API_URL }}
      MOF_AIS_INFO_SERVICE_KEY: ${{ secrets.MOF_AIS_INFO_SERVICE_KEY }}
      MOF_AIS_STAT_API_URL: ${{ secrets.MOF_AIS_STAT_API_URL }}
      MOF_AIS_STAT_SERVICE_KEY: ${{ secrets.MOF_AIS_STAT_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund --progress=false

      - name: Refresh fast auxiliary summaries
        timeout-minutes: 15
        run: npm run update:fast-aux

      - name: Validate
        if: always()
        run: npm run validate

      - name: Guard fast auxiliary refresh
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const status = JSON.parse(fs.readFileSync("dashboard/api/source-collection-status.json", "utf8"));
          const owned = new Set(["pilot_sources", "berth_sources", "mof_ais_info", "mof_ais_dynamic", "mof_ais_stat", "ulsan_core", "ulsan_berth_detail", "ulsan_cargo_plan", "ulsan_berth_operation", "ulsan_terminal_process"]);
          const refreshed = (status.items || []).filter(item =>
            owned.has(item.source_key) &&
            ["ACTIVE", "PARTIAL"].includes(String(item.status || "").toUpperCase()) &&
            item.preserved_after_unsuccessful_attempt !== true
          );
          console.log(`fast_aux refreshed_source_count=${refreshed.length}`);
          if (!refreshed.length) {
            throw new Error("fast_aux produced no refreshed auxiliary source diagnostics; keeping previous committed aux cache.");
          }
          NODE

      - name: Audit tier consistency
        run: npm run audit:tiered-update

      - name: Commit fast auxiliary diagnostics
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          add_if_exists() {
            if [ -e "$1" ]; then
              git add "$1"
            fi
          }
          add_if_exists dashboard/api/source-health-runtime.json
          add_if_exists dashboard/api/source-collection-status.json
          add_if_exists dashboard/api/source-quality-score.json
          add_if_exists dashboard/api/enrichment-utilization.json
          add_if_exists dashboard/api/aux/latest/
          add_if_exists dashboard/api/aux/pilotage-summary.json
          add_if_exists dashboard/api/aux/berth-summary.json
          add_if_exists dashboard/api/aux/ais-info-summary.json
          add_if_exists dashboard/api/aux/ais-dynamic-summary.json
          add_if_exists dashboard/api/aux/vessel-spec-summary.json
          add_if_exists dashboard/api/aux/cache-status.json
          add_if_exists dashboard/api/aux/source-schedule.json
          add_if_exists dashboard/api/runtime/update-tiers.json
          add_if_exists data/cache/auxiliary-source-cache-status.json
          if git diff --cached --quiet; then
            echo "No fast auxiliary diagnostics changes to commit"
          else
            git commit -m "chore: update fast auxiliary diagnostics [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Upload auxiliary cache artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: korea-port-intelligence-fast-aux-cache
          retention-days: 14
          path: |
            dashboard/api/aux/latest/
            dashboard/api/aux/pilotage-summary.json
            dashboard/api/aux/berth-summary.json
            dashboard/api/aux/ais-info-summary.json
            dashboard/api/aux/ais-dynamic-summary.json
            dashboard/api/aux/vessel-spec-summary.json
            dashboard/api/aux/cache-status.json
            dashboard/api/runtime/update-tiers.json
